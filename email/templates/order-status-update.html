<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status Update</title>
</head>

<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f5f5f5;">
    <table role="presentation" style="width: 100%; border-collapse: collapse;">
        <tr>
            <td style="padding: 40px 0; text-align: center; background-color: #000000;">
                <h1 style="margin: 0; color: #ffffff; font-size: 24px; font-weight: bold;">{{SITE_NAME}}</h1>
            </td>
        </tr>
        <tr>
            <td style="padding: 40px 20px;">
                <table role="presentation"
                    style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                    <tr>
                        <td style="padding: 40px;">
                            <h2 style="margin: 0 0 10px; font-size: 24px; color: #000000;">Order Update</h2>
                            <p style="margin: 0 0 20px; color: #666666; line-height: 1.6;">Hi {{CUSTOMER_NAME}},</p>
                            <p style="margin: 0 0 20px; color: #666666; line-height: 1.6;">There's an update on your
                                order #{{ORDER_NUMBER}}.</p>

                            <div
                                style="background-color: #f5f5f5; padding: 30px; border-radius: 8px; margin: 20px 0; text-align: center;">
                                <p style="margin: 0 0 10px; color: #000000; font-size: 18px; font-weight: bold;">Status:
                                    {{STATUS}}</p>
                                <p style="margin: 0; color: #666666;">{{STATUS_MESSAGE}}</p>
                            </div>

                            <div style="text-align: center; margin: 30px 0;">
                                <a href="{{TRACK_URL}}"
                                    style="display: inline-block; padding: 15px 40px; background-color: #000000; color: #ffffff; text-decoration: none; border-radius: 4px; font-weight: bold;">View
                                    Order Details</a>
                            </div>

                            <p style="margin: 20px 0 0; color: #666666; font-size: 14px; line-height: 1.6;">Thank you
                                for shopping with us!</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <td style="padding: 20px; text-align: center; color: #999999; font-size: 12px;">
                <p style="margin: 0 0 10px;">&copy; {{SITE_NAME}}. All rights reserved.</p>
                <p style="margin: 0;"><a href="{{SITE_URL}}" style="color: #000000;">Visit our website</a></p>
            </td>
        </tr>
    </table>
</body>

</html>
